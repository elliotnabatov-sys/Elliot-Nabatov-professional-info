<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elliot Nabatov</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #080d1a; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #080d1a; }
      ::-webkit-scrollbar-thumb { background: #2a3050; border-radius: 3px; }

      @media (max-width: 768px) {
        .hero {
          grid-template-columns: 1fr !important;
          padding: 36px 20px 32px !important;
          gap: 28px !important;
        }
        .hero-right {
          width: 100% !important;
        }
        .main {
          padding: 0 20px !important;
        }
        .about-grid {
          grid-template-columns: 1fr !important;
          gap: 28px !important;
        }
        .contact-grid {
          grid-template-columns: 1fr !important;
          gap: 28px !important;
        }
        .nav-inner {
          padding: 12px 20px !important;
        }
        .nav-links {
          gap: 2px !important;
        }
        .nav-btn {
          padding: 6px 10px !important;
          font-size: 11px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
